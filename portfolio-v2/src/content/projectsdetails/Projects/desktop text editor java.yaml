overview: >
  Desktop Text Editor Java is a Swing-based text editing application created to
  explore desktop GUI development, event-driven programming, Java I/O, and the
  Event Dispatch Thread architecture. The application provides text editing,
  font customization, color selection, and live document statistics while
  maintaining zero external dependencies. :contentReference[oaicite:1]{index=1}

problem: >
  Many Java projects focus primarily on console applications and overlook GUI
  development concepts such as event-driven architecture, UI thread safety,
  document models, and desktop software design. Building a text editor provides
  practical exposure to these areas.

solution: >
  Developed a desktop text editor using Java Swing and AWT that supports text
  file editing, customizable fonts and colors, live word and line counting,
  safe file I/O operations, and modular Java architecture through JPMS.

architecture: >
  Single-process desktop application built around Swing's event-driven model.
  User actions are processed through the AWT Event Queue and Event Dispatch
  Thread, while JTextArea and PlainDocument manage document storage. File I/O,
  font management, color customization, and status updates are coordinated
  through Swing event listeners and UI components. :contentReference[oaicite:2]{index=2}

challenges:
  - Understanding Swing's Event Dispatch Thread requirements.
  - Implementing real-time document statistics.
  - Managing file I/O safely using try-with-resources.
  - Working with JPMS module declarations.
  - Handling dynamic font enumeration from the operating system.
  - Designing responsive UI interactions using event listeners.
  - Understanding gap-buffer-based text storage concepts.

lessonsLearned:
  - Swing event-driven architecture.
  - Event Dispatch Thread concurrency rules.
  - Observer pattern implementation through listeners.
  - Java file I/O and resource management.
  - JPMS module system fundamentals.
  - Desktop application architecture patterns.
  - Gap buffer data structures and text editor internals.
  - GUI state management and event handling.

futureImprovements:
