overview: >
  TaskFlow is a real-time task management application designed to explore
  reactive backend architectures using Convex. Instead of relying on traditional
  REST polling, the application uses subscription-based data synchronization,
  allowing task updates to be automatically pushed to connected clients in
  real time. :contentReference[oaicite:0]{index=0}

problem: >
  Traditional task management applications often rely on periodic polling and
  manual cache invalidation, resulting in stale data, unnecessary network
  requests, and increased client-side complexity when supporting multi-device
  synchronization.

solution: >
  Built a reactive task management platform using Convex's subscription model,
  enabling automatic real-time synchronization of tasks, progress tracking,
  theme persistence, and cross-platform support from a single codebase.

architecture: >
  Cross-platform React Native application built with Expo Router and Convex.
  The frontend subscribes to reactive queries through WebSocket connections,
  while Convex manages database operations, query invalidation, and automatic
  synchronization. Theme preferences are handled using React Context and
  AsyncStorage. :contentReference[oaicite:1]{index=1}

challenges:
  - Adapting to a reactive data-fetching mental model.
  - Understanding Convex subscription architecture.
  - Implementing nested Expo Router layouts.
  - Managing theme hydration and persistence timing.
  - Supporting consistent UI behavior across Android, iOS, and Web.
  - Optimizing performance for real-time updates and virtualized lists.

lessonsLearned:
  - Reactive versus request-driven architectures.
  - Real-time synchronization patterns.
  - Optimistic concurrency control concepts.
  - Expo Router file-based navigation architecture.
  - React Native New Architecture and JSI concepts.
  - Cross-platform mobile development workflows.
  - State persistence using AsyncStorage.
  - Subscription-driven UI rendering techniques.

