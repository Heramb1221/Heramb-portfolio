overview: >
  Velvet Pour is an immersive marketing website designed around advanced
  scroll-driven interactions and cinematic animations. The project explores
  animation engineering concepts including video scrubbing, SplitText effects,
  CSS masking, pinned sections, parallax effects, and high-performance DOM
  animation patterns within a React application.

problem: >
  Building highly interactive scroll-driven experiences requires careful
  coordination between React's rendering lifecycle and animation libraries that
  directly manipulate the DOM. Without proper architecture, complex animations
  can introduce performance issues, memory leaks, and inconsistent behavior.

solution: >
  Developed a single-page animated experience using GSAP and ScrollTrigger,
  leveraging lifecycle-aware animation management through useGSAP(), context
  cleanup, responsive animation configurations, and optimized scroll-based
  interactions.

architecture: >
  Client-side React application built with Vite. React components render the UI
  while GSAP ScrollTrigger manages animation timelines, video scrubbing, pinned
  sections, and DOM mutations. Animations are isolated using GSAP contexts to
  ensure proper cleanup and prevent lifecycle-related issues.

challenges:
  - Synchronizing video scrubbing with metadata loading.
  - Managing GSAP cleanup within React StrictMode.
  - Supporting different ScrollTrigger behaviors on mobile devices.
  - Implementing performant CSS mask animations.
  - Coordinating multiple concurrent animation systems.
  - Preventing animation state leakage across component re-renders.

lessonsLearned:
  - GSAP context and cleanup patterns.
  - ScrollTrigger internals and optimization techniques.
  - Video scrubbing implementation strategies.
  - React lifecycle integration with DOM-mutating libraries.
  - CSS masking animation techniques.
  - Tailwind CSS v4 architecture.
  - Performance optimization for animation-heavy interfaces.
  - Responsive animation design patterns.

futureImprovements:
  - TypeScript migration.
