overview: >
  Q.Cafe is a multi-section coffee shop landing page designed to explore core
  frontend development concepts including responsive layouts, design systems,
  browser APIs, animations, and UI composition. The project intentionally avoids
  frameworks to strengthen understanding of HTML, CSS, and JavaScript
  fundamentals.

problem: >
  Modern frontend development often relies heavily on frameworks, making it easy
  to overlook the browser primitives that power responsive layouts,
  animations, and interactive user experiences. Building a polished marketing
  website without abstractions provides a deeper understanding of these
  foundations.

solution: >
  Developed a responsive single-page marketing website using CSS Grid, Flexbox,
  custom design tokens, ScrollReveal animations, and Swiper-powered carousels
  while maintaining a lightweight architecture with no framework dependencies.

architecture: >
  Static frontend architecture built with semantic HTML, CSS custom properties,
  CSS Grid layouts, and vanilla JavaScript interactions. ScrollReveal handles
  viewport-based animations using IntersectionObserver, while Swiper provides
  touch-enabled carousel functionality. The application is optimized for static
  hosting environments such as Netlify, GitHub Pages, and Vercel.

challenges:
  - Building fluid CSS Grid layouts using auto-fit and minmax().
  - Creating responsive designs across multiple breakpoints.
  - Implementing clip-path based mobile navigation animations.
  - Customizing Swiper pagination components.
  - Managing ScrollReveal staggered animations.
  - Maintaining visual consistency through design tokens.
  - Achieving smooth animations without framework abstractions.

lessonsLearned:
  - CSS Grid and Flexbox layout systems.
  - CSS custom properties as runtime design tokens.
  - IntersectionObserver versus scroll event listeners.
  - Compositor-thread animation optimization.
  - Responsive design architecture.
  - Event-driven JavaScript interactions.
  - Third-party library integration patterns.
  - Frontend performance optimization techniques.

