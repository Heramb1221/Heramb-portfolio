name: Harshit Shinde

role: Collaborator & Project Collaborator

organization: R.C. Patel Institute of Technology, Shirpur

message: >
  Having worked closely with Heramb for the past two years on our semester and final-year projects, I can confidently say he is one of the most genuine and punctual professionals I know. He is incredibly disciplined, always completing his work well ahead of deadlines with a level of precision that rarely, if ever, falters. Heramb brings a rare level of transparency and honesty to a team, never hesitating to call out what is working and what needs correction to ensure the project's success. Beyond being a highly reliable teammate whose work speaks for itself, his integrity and collaborative nature have also made him a trusted, close friend over the last three years.

