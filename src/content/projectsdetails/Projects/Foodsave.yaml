overview: >
  FoodSave is a multi-role marketplace platform designed to reduce food waste by
  enabling businesses to sell surplus food at discounted prices before expiry.
  Customers can browse listings and place pickup orders, while administrators
  manage business approvals and platform governance.

problem: >
  Food waste remains a major issue for restaurants, bakeries, and food vendors
  who often discard surplus inventory. At the same time, customers may seek
  affordable food options. A system was needed to connect these groups while
  managing inventory, approvals, and ordering workflows.

solution: >
  Built a role-based marketplace where businesses can list surplus food items,
  customers can purchase discounted inventory, and administrators can control
  business onboarding and platform moderation through structured approval
  workflows.

architecture: >
  Traditional Java enterprise architecture using Spring MVC for request
  handling, Hibernate ORM for persistence, MySQL as the relational database,
  JSP for server-side rendering, and Apache Tomcat for deployment. The system
  follows a layered MVC architecture with Controllers, DAO layer, Hibernate ORM,
  and relational database storage.

challenges:
  - Designing a multi-role access control system.
  - Managing inventory lifecycle transitions.
  - Implementing order state management workflows.
  - Configuring Spring MVC without Spring Boot.
  - Integrating Hibernate with Spring ORM.
  - Designing normalized relational database schemas.
  - Managing session-based authentication flows.

lessonsLearned:
  - Spring MVC internals and DispatcherServlet lifecycle.
  - Hibernate SessionFactory configuration and ORM patterns.
  - Relational database design and normalization.
  - DAO pattern implementation.
  - Enterprise Java application architecture.
  - Session-based authentication mechanisms.
  - Domain-driven state machine modeling.
  - Traditional Java web deployment workflows.