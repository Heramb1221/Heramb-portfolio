overview: >
  Afterglow is a cinematic frontend project designed to explore immersive
  interaction design, animation systems, visual storytelling, and premium user
  interface architecture. The project focuses on delivering an engaging digital
  experience through motion, typography, layering effects, and responsive
  layouts.

problem: >
  Creating visually immersive web experiences requires balancing animation,
  responsiveness, performance, and maintainability. Building rich interactions
  without relying on frontend frameworks also presents architectural and design
  challenges.

solution: >
  Developed a motion-driven frontend experience using GSAP, modular
  HTML/CSS/JavaScript architecture, responsive layouts, theme switching, and
  modern UI techniques such as glassmorphism and layered visual effects to
  create a cinematic browsing experience.

architecture: >
  Static frontend architecture consisting of separated HTML, CSS, and
  JavaScript layers. GSAP manages animation orchestration, CSS variables power
  the design system and theme switching, while responsive layouts ensure
  compatibility across devices and screen sizes.

challenges:
  - Coordinating multiple animation timelines.
  - Maintaining smooth rendering performance.
  - Balancing visual aesthetics with responsiveness.
  - Implementing premium UI effects without excessive complexity.
  - Managing blur and glassmorphism rendering costs.
  - Designing scalable frontend architecture without frameworks.

lessonsLearned:
  - Frontend interaction engineering.
  - Animation orchestration using GSAP.
  - Responsive UI architecture principles.
  - Visual hierarchy and storytelling techniques.
  - CSS variable-based design systems.
  - Premium user experience design patterns.
  - Performance considerations for animation-heavy interfaces.
  - Structuring scalable frontend projects without framework abstractions.

