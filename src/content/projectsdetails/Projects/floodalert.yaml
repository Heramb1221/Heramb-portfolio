overview: >
  FloodAlert India is a disaster management platform that enables citizens to
  report flood incidents, authorities to issue alerts and manage emergency
  situations, and administrators to oversee system operations. The application
  models the key workflows required for flood monitoring, communication, and
  emergency response coordination.

problem: >
  Flood disasters often expose communication gaps between citizens, local
  authorities, and emergency management teams. A centralized platform is needed
  to facilitate alert dissemination, incident reporting, and coordinated
  response efforts.

solution: >
  Built a role-based web application that allows citizens to submit flood
  reports, authorities to issue alerts and manage emergencies, and
  administrators to manage users and monitor platform activity through
  dedicated dashboards.

architecture: >
  Java EE architecture built using Java Servlets for request handling, JSP for
  server-side rendering, JDBC for database communication, and MySQL for data
  storage. Apache Tomcat acts as the servlet container, while individual
  servlets handle authentication, reporting, alert creation, and emergency
  management workflows.

challenges:
  - Implementing multi-role routing and access control.
  - Understanding the Java Servlet lifecycle.
  - Managing JDBC database connections safely.
  - Designing relational schemas for disaster management workflows.
  - Coordinating flood reporting and alert management processes.
  - Handling request-response workflows without modern frameworks.
  - Identifying security flaws during architecture review.

lessonsLearned:
  - Java Servlet lifecycle mechanics.
  - JDBC connection management patterns.
  - Role-based application architecture.
  - Authentication versus session management concepts.
  - JSP rendering and server-side architecture tradeoffs.
  - Relational database schema design.
  - Security auditing and vulnerability identification.
  - Multi-threaded server behavior in Java web applications.

futureImprovements:
  - Proper session-based authentication.
  - Connection pooling implementation.
  - Weather API integration.
  - Secure password storage and hashing.
  - REST API layer development.
  - Spring Boot migration.
  - Role-based authorization middleware.
  - Real-time alert notifications.
  - Audit logging system.
  - Improved security hardening and vulnerability mitigation.