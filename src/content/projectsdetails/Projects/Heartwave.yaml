overview: >
  HeartWave is a collaborative media platform that allows groups of users to
  listen to and watch YouTube content together in synchronized rooms. Users can
  create rooms, invite participants, manage shared queues, chat in real time,
  and experience synchronized playback regardless of location. :contentReference[oaicite:0]{index=0}

problem: >
  Traditional media consumption is often isolated, making it difficult for
  friends and communities to enjoy content together remotely. Building such a
  platform requires solving complex synchronization challenges caused by network
  latency and distributed client state.

solution: >
  Built a server-authoritative real-time platform that synchronizes playback
  across multiple users using dead-reckoning, drift correction algorithms,
  shared queues, and WebSocket-based communication to deliver a collaborative
  listening experience.

architecture: >
  Client-server architecture powered by React, Socket.io, Express, and MongoDB.
  Playback state is maintained on the server, synchronized through WebSocket
  events, and corrected using drift-detection logic. Authentication is managed
  by Clerk, while Stripe handles subscription billing and lifecycle events. :contentReference[oaicite:1]{index=1}

challenges:
  - Designing synchronized playback without constant seeking.
  - Managing server-authoritative room state.
  - Implementing drift correction algorithms.
  - Handling Socket.io reconnection and user recovery.
  - Integrating Stripe webhook verification.
  - Managing YouTube IFrame lifecycle events.
  - Coordinating authentication between Clerk and Express.

