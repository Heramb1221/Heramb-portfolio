overview: >
  ConverseCloud is a language-learning social platform that helps users connect
  with native speakers around the world. Users create profiles, discover
  compatible language partners, send friend requests, chat in real time, and
  conduct video calls. The project was built to explore real-world challenges in
  authentication, WebSocket management, real-time communication systems, and
  scalable full-stack architecture.

problem: >
  Most language-learning platforms focus heavily on vocabulary and grammar but
  provide limited opportunities for real conversational practice with native
  speakers. Users often struggle to find language partners and maintain
  meaningful language exchange interactions.

solution: >
  Built a language exchange platform that matches users based on native and
  learning languages, enabling them to form connections, communicate through
  real-time messaging, and practice speaking through integrated video calls.

architecture: >
  MERN-based architecture with a React frontend and Express backend. User data,
  profiles, and friend requests are stored in MongoDB Atlas through Mongoose.
  Authentication is handled using JWT tokens stored in httpOnly cookies. Real-time
  chat and WebRTC video communication are powered through Stream Chat and Stream
  Video APIs, while TanStack Query manages server state and caching.

challenges:
  - Managing WebSocket lifecycle and preventing duplicate connections.
  - Implementing deterministic channel IDs for consistent chat creation.
  - Coordinating authentication between frontend, backend, and Stream services.
  - Handling authentication state propagation without Redux.
  - Balancing build-vs-buy decisions when integrating managed communication infrastructure.

lessonsLearned:
  - Real-time communication architecture.
  - WebSocket lifecycle management in React applications.
  - Authentication using JWT and httpOnly cookies.
  - Server state management with TanStack Query.
  - Backend token generation and secure API design.
  - Tradeoffs of managed infrastructure services.
  - MongoDB data modeling and query optimization.
  - Full-stack application deployment and integration.

futureImprovements:
  - Refresh token rotation.
  - Redis caching.
  - Recommendation pagination.
  - MongoDB transactions.
  - API rate limiting.
  - Zod validation.
  - Helmet.js security hardening.
  - Automated testing.
  - CI/CD pipelines.
  - Lazy loading and bundle optimization.
  - Docker containerization.

