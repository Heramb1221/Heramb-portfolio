overview: >
  LoomCV is a production-inspired resume builder platform that combines resume
  creation, AI-assisted content generation, subscription management, cloud file
  storage, and real-time preview functionality into a complete SaaS experience.
  The application explores real-world patterns such as authentication, billing,
  permissions, persistence, and AI integration. :contentReference[oaicite:0]{index=0}

problem: >
  Many resume builders either lack intelligent content assistance or do not
  expose developers to the architectural challenges involved in building a real
  SaaS product. Users need a platform that simplifies resume creation while
  improving content quality through AI assistance.

solution: >
  Built a full-stack SaaS platform that allows users to create, edit, preview,
  and download resumes while leveraging Gemini AI for professional summaries and
  ATS-optimized work experience generation. Subscription tiers unlock advanced
  features and higher resume limits.

architecture: >
  Next.js App Router serves as the full application layer using React Server
  Components, Client Components, Server Actions, and API routes. Clerk handles
  authentication, Prisma manages PostgreSQL access, Stripe manages billing,
  Gemini powers AI generation, and Vercel Blob provides file storage. :contentReference[oaicite:1]{index=1}

challenges:
  - Implementing reliable auto-save workflows.
  - Managing Stripe subscription lifecycle events.
  - Handling Prisma database connections during development.
  - Building AI-assisted resume generation workflows.
  - Designing permission systems for subscription tiers.
  - Understanding App Router and Server Actions architecture.

lessonsLearned:
  - SaaS architecture and subscription systems.
  - Stripe billing and webhook integrations.
  - Authentication and authorization patterns.
  - App Router and React Server Components.
  - Server Actions as an API layer.
  - Prisma ORM and database modeling.
  - AI integration within production-style applications.
  - End-to-end type-safe development using TypeScript and Zod.

futureImprovements:
  - ATS resume scoring and analysis.
  - Cover letter generation.
  - Multiple resume templates.
  - Redis-based rate limiting.
  - Content Security Policy implementation.

